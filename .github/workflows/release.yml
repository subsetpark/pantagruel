name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: pant-linux-x86_64
          - os: macos-latest
            artifact: pant-macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.4.1"

      - name: Use opam.ocaml.org archive cache
        # erratique.ch (upstream for cmdliner, mtime, fpath, logs, uutf, ...)
        # is frequently flaky; the community cache mirrors opam-repository
        # archives behind a CDN, so opam only falls back to upstream on a miss.
        run: opam option archive-mirrors=https://opam.ocaml.org/cache

      - name: Install dependencies
        run: opam install ./pantagruel.opam --deps-only

      - name: Build
        run: opam exec -- dune build -p pantagruel

      - name: Package binary
        run: |
          cp _build/default/bin/main.exe pant
          tar czf ${{ matrix.artifact }}.tar.gz pant

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: gh release create ${{ github.ref_name }} *.tar.gz --generate-notes

  homebrew:
    name: Update Homebrew Formula
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Compute SHA256 checksums
        id: sha
        run: |
          echo "macos_arm64=$(shasum -a 256 pant-macos-arm64.tar.gz | cut -d ' ' -f 1)" >> "$GITHUB_OUTPUT"
          echo "linux_x86_64=$(shasum -a 256 pant-linux-x86_64.tar.gz | cut -d ' ' -f 1)" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6

      - name: Generate and commit formula
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -e "s/VERSION/$VERSION/g" \
              -e "s/SHA256_MACOS_ARM64/${{ steps.sha.outputs.macos_arm64 }}/g" \
              -e "s/SHA256_LINUX_X86_64/${{ steps.sha.outputs.linux_x86_64 }}/g" \
              Formula/pantagruel.rb.template > Formula/pantagruel.rb
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/pantagruel.rb
          git commit -m "Formula: pantagruel ${GITHUB_REF_NAME}"
          git push origin HEAD:master
