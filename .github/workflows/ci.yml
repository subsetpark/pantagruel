name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.4.1"

      - name: Install dependencies
        run: |
          opam install . --deps-only --with-test --with-doc
          opam install ocamlformat.0.28.1
          opam install bisect_ppx

      - name: Build
        run: opam exec -- dune build

      - name: Test with coverage
        run: |
          opam exec -- dune test --instrument-with bisect_ppx --force

      - name: Coverage summary
        run: opam exec -- bisect-ppx-report summary

      - name: Upload coverage to Codecov
        if: github.event_name == 'pull_request'
        run: opam exec -- bisect-ppx-report send-to Codecov
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Check formatting
        run: opam exec -- dune build @fmt

      - name: Check documentation builds
        run: opam exec -- dune build @doc

      - name: Check samples
        run: |
          for f in samples/*.pant; do
            opam exec -- dune exec pant -- "$f"
          done
