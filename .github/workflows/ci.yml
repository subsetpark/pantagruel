name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.4.1"

      - name: Install dependencies
        run: |
          opam install . --deps-only --with-test --with-doc
          opam install ocamlformat.0.28.1

      - name: Build
        run: opam exec -- dune build

      - name: Test
        run: opam exec -- dune test

      - name: Check formatting
        run: opam exec -- dune build @fmt

      - name: Check documentation builds
        run: opam exec -- dune build @doc

      - name: Fuzz (QuickCheck mode)
        run: |
          opam install crowbar -y
          opam exec -- dune exec fuzz/fuzz_lexer.exe
          opam exec -- dune exec fuzz/fuzz_parser.exe
          opam exec -- dune exec fuzz/fuzz_pipeline.exe

      - name: Check samples
        run: |
          for f in samples/*.pant; do
            opam exec -- dune exec pant -- "$f"
          done

  ts2pant:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/ts2pant
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: tools/ts2pant/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npx biome check src

      - name: Format
        run: npx biome format --check src

      - name: Test
        run: npx vitest run
