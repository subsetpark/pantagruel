name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Both jobs run inside the official `ocaml/opam` Docker image, which has opam
# and the OCaml 5.4 switch baked in. This bypasses `ocaml/setup-ocaml` (which
# does a live GitHub release lookup at job start) — that lookup has been
# repeatedly broken by upstream opam release naming changes (see git log for
# the chain of pin commits this replaces). Bump the image tag to upgrade OCaml.
jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ocaml/opam@sha256:e0d737b2097c164673462f5756fb849306467f1ea4e617c5a69d8e95fa6de236
      # Override the image's default `opam` (uid 1000) user — GHA mounts the
      # workspace with ownership the in-image opam user can't write to, so
      # `actions/checkout@v6` fails before any of our steps run.
      options: --user root
    env:
      # Reuse the switch baked into the image (which lives under the opam
      # user's home) instead of letting opam create a fresh one under /root.
      OPAMROOT: /home/opam/.opam
      # opam refuses to run as root by default; this overrides that check.
      OPAMROOTISOK: "1"
      OPAMYES: "1"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Trust workspace
        # Without this, `git` invocations inside dune/opam subprocesses fail
        # with "dubious ownership" because the workspace is mounted with
        # ownership root doesn't recognize.
        run: git config --global --add safe.directory '*'

      - name: Install dependencies
        run: |
          opam install ./pantagruel.opam --deps-only --with-test --with-doc
          opam install ocamlformat.0.28.1

      - name: Build
        run: opam exec -- dune build

      - name: Test
        run: opam exec -- dune test

      - name: Check formatting
        run: opam exec -- dune build @fmt

      - name: Check documentation builds
        run: opam exec -- dune build @doc

      - name: Fuzz (QuickCheck mode)
        run: |
          opam install crowbar -y
          opam exec -- dune exec fuzz/fuzz_lexer.exe
          opam exec -- dune exec fuzz/fuzz_parser.exe
          opam exec -- dune exec fuzz/fuzz_pipeline.exe
          opam exec -- dune exec fuzz/fuzz_smt.exe

      - name: Check samples
        run: |
          for f in samples/*.pant; do
            opam exec -- dune exec pant -- "$f"
          done

  ts2pant-build:
    runs-on: ubuntu-latest
    container:
      image: ocaml/opam@sha256:e0d737b2097c164673462f5756fb849306467f1ea4e617c5a69d8e95fa6de236
      options: --user root
    env:
      OPAMROOT: /home/opam/.opam
      OPAMROOTISOK: "1"
      OPAMYES: "1"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Trust workspace
        run: git config --global --add safe.directory '*'

      - name: Install just
        # Install directly from the GitHub release tarball so we don't depend
        # on `extractions/setup-just`'s release-lookup logic. Pinned for
        # reproducibility; bump as needed.
        run: |
          just_archive=just-1.50.0-x86_64-unknown-linux-musl.tar.gz
          curl -fsSLo "/tmp/${just_archive}" "https://github.com/casey/just/releases/download/1.50.0/${just_archive}"
          printf '%s  %s\n' '27e011cd6328fadd632e59233d2cf5f18460b8a8c4269acd324c1a8669f34db0' "/tmp/${just_archive}" | sha256sum -c -
          tar -xzf "/tmp/${just_archive}" -C /usr/local/bin just
          just --version

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: tools/ts2pant/package-lock.json

      - name: Install binaryen
        # `conf-binaryen` (pulled in by `wasm_of_ocaml-compiler`) probes for
        # `wasm-opt` at opam install time, so binaryen must be on PATH before
        # the next step. Also needed at link time by wasm_of_ocaml.
        run: npm install -g binaryen

      - name: Install OCaml dependencies
        run: |
          opam install . --deps-only
          opam install js_of_ocaml js_of_ocaml-ppx wasm_of_ocaml-compiler

      - name: Build pant
        run: opam exec -- just build-pant

      - name: Build wasm for ts2pant
        run: opam exec -- just ts2pant-build-wasm

      - name: Install ts2pant dependencies
        run: cd tools/ts2pant && npm ci

      - name: Typecheck
        run: just ts2pant-typecheck

      - name: Lint
        run: just ts2pant-lint-ci

      - name: Upload ts2pant build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ts2pant-build-artifacts
          if-no-files-found: error
          path: |
            _build/default/bin/main.exe
            tools/ts2pant/src/wasm/**

  ts2pant:
    runs-on: ubuntu-latest
    needs: ts2pant-build
    strategy:
      fail-fast: false
      matrix:
        test-group: [unit-constructs, unit-rest, integration]
    container:
      image: ocaml/opam@sha256:e0d737b2097c164673462f5756fb849306467f1ea4e617c5a69d8e95fa6de236
      options: --user root
    env:
      OPAMROOT: /home/opam/.opam
      OPAMROOTISOK: "1"
      OPAMYES: "1"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Trust workspace
        run: git config --global --add safe.directory '*'

      - name: Install just
        run: |
          just_archive=just-1.50.0-x86_64-unknown-linux-musl.tar.gz
          curl -fsSLo "/tmp/${just_archive}" "https://github.com/casey/just/releases/download/1.50.0/${just_archive}"
          printf '%s  %s\n' '27e011cd6328fadd632e59233d2cf5f18460b8a8c4269acd324c1a8669f34db0' "/tmp/${just_archive}" | sha256sum -c -
          tar -xzf "/tmp/${just_archive}" -C /usr/local/bin just
          just --version

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: tools/ts2pant/package-lock.json

      - name: Download ts2pant build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: ts2pant-build-artifacts
          path: .

      - name: Restore artifact permissions
        run: chmod +x _build/default/bin/main.exe

      - name: Install ts2pant dependencies
        run: cd tools/ts2pant && npm ci

      - name: Test (${{ matrix.test-group }})
        run: |
          case "${{ matrix.test-group }}" in
            unit-constructs)
              just ts2pant-test-unit-constructs-from-artifacts
              ;;
            unit-rest)
              just ts2pant-test-unit-rest-from-artifacts
              ;;
            integration)
              just ts2pant-test-integration-from-artifacts
              ;;
            *)
              echo "unknown ts2pant test group: ${{ matrix.test-group }}" >&2
              exit 1
              ;;
          esac
