language: en
reviews:
  profile: assertive
  request_changes_workflow: false
  high_level_summary: false
  sequence_diagrams: false
  poem: false
  review_status: false
  collapse_walkthrough: true
  changed_files_summary: false
  labeling_instructions: []
  finishing_touches:
    docstrings: false
    unit_tests: false
  auto_review:
    enabled: true
    auto_pause_after_reviewed_commits: -1
    drafts: false
  path_instructions:
    - path: "lib/**"
      instructions: >
        Core library for Pantagruel, a specification language checker in OCaml.
        Focus on type safety, exhaustive pattern matching, and correctness.
        The pipeline is: lexer (sedlex) -> parser (menhir) -> collect (declaration gathering) -> check (type checking).
        Key types: Ast.type_expr (syntactic), Types.ty (internal with numeric hierarchy Nat < Nat0 < Int < Real), Env.t (type environment).
    - path: "lib/smt*.ml"
      instructions: >
        SMT bounded model checking. This module is large (~2900 LOC) and slated for decomposition.
        Review for correctness of Z3/CVC5 encoding, proper guard injection, and soundness of bounded checks.
    - path: "test/**"
      instructions: >
        Alcotest + QCheck tests. Check for good coverage of edge cases.
        Tests should never be skipped — if a test fails, fix the underlying issue.
    - path: "samples/**"
      instructions: >
        Sample .pant specification files used for validation and documentation.
        These are also used as integration tests — check that they exercise the feature they claim to demonstrate.
    - path: "tools/ts2pant/**"
      instructions: >
        TypeScript-to-Pantagruel translator. TypeScript codebase (not OCaml).
        Embeds a WASM build of the Pantagruel parser for capture-avoiding substitution and AST construction.
    - path: "wasm/**"
      instructions: >
        WebAssembly build of the Pantagruel parser via wasm_of_ocaml.
        Build is gated by BUILD_WASM=true env var.
  tools:
    enabled: true
knowledge_base:
  code_guidelines:
    - description: "Exhaustive pattern matching"
      content: >
        All match expressions must be exhaustive. Never use wildcard catch-all patterns
        that silently ignore new variants. When adding a new constructor to a variant type,
        the compiler should force updates to every match site.
    - description: "Numeric type hierarchy"
      content: >
        Pantagruel has a numeric subtyping hierarchy: Nat < Nat0 < Int < Real.
        Nat is strictly positive, Nat0 includes zero. Type checking must respect
        this hierarchy — a Nat is always valid where Nat0 is expected, etc.
    - description: "No mutable state in the type checker"
      content: >
        The type environment (Env.t) is immutable and threaded through the pipeline.
        Do not introduce mutable refs or hashtables for type information.
    - description: "Declaration guards are semantic, not syntactic"
      content: >
        Declaration guards (e.g., `score u: User, active u => Nat.`) are stored in
        Env.rule_guards and automatically injected as antecedents in SMT queries.
        They are not just documentation — they affect verification.
    - description: "Action labels are not terms"
      content: >
        Action labels (the text between ~> and @) are free-form human-readable
        annotations. They are not in the term namespace and should not be resolved
        or type-checked as expressions.
    - description: "Primed expressions only in action contexts"
      content: >
        Primed expressions like f' denote post-state values and are only valid
        inside action bodies (after ~>). The type checker must reject primed
        expressions outside action contexts.
    - description: "Tests must never be skipped"
      content: >
        If a test fails, fix the underlying issue rather than skipping or disabling it.
        All tests run via `dune test`. The project uses Alcotest for unit tests
        and QCheck for property-based tests.
    - description: "OCaml style: prefer Result/Option over exceptions"
      content: >
        Use Result and Option types for expected failure modes. Reserve exceptions
        for truly exceptional/unrecoverable situations. Pattern match on results
        rather than catching exceptions.
    - description: "ts2pant: opaque AST discipline"
      content: >
        All Pantagruel AST construction must go through getAst() methods returning
        opaque handles (OpaqueExpr, OpaqueParam, etc.). All substitution must use
        ast.substituteBinder(). TypeScript code must never traverse, inspect, or
        pattern-match on OCaml heap values. This boundary is load-bearing for
        capture-avoiding substitution correctness.
    - description: "ts2pant: name hygiene via UniqueSupply"
      content: >
        Fresh binders must use hygienic names ($0, $1, etc.) from UniqueSupply,
        never user-facing identifiers. Hygienic names use $ prefix which cannot
        appear as property names, making collisions structurally impossible.
        UniqueSupply must be monotonic — never reset or reuse counters.
    - description: "ts2pant: explicit unsupported results, not exceptions"
      content: >
        Translation failures use explicit { unsupported: reason } results
        (BodyResult/PropResult unions), not exceptions. Reasons must be
        user-facing descriptions of what's not supported. Use isBodyUnsupported()
        type guards for discrimination.
    - description: "ts2pant: guard extraction before body translation"
      content: >
        Guards (if-throw preconditions, assert() calls, helper guard propagation)
        must be extracted before body translation to avoid double-processing.
        Guard detection in translate-signature.ts must match isGuardStatement()
        in translate-body.ts exactly.
    - description: "ts2pant: frame conditions for mutating functions"
      content: >
        Mutating functions (void return or property assignments) produce actions
        with primed propositions. Frame conditions are mandatory: identify all
        primed variables in the action body, then emit identity constraints
        (prop' obj = prop obj) for every accessor rule not in the modifies set.
    - description: "ts2pant: numeric strategy is pluggable, not hardcoded"
      content: >
        TypeScript number maps to Pantagruel types via a NumericStrategy interface
        with .mapNumber(). Never hardcode "Int" or "Real" — always use
        strategy.mapNumber(). Strategy is threaded through translateBody() and
        translateTypes() per-document.
    - description: "ts2pant: standard algorithms with literature references"
      content: >
        Translation algorithms must be named standard techniques with literature
        citations, not ad-hoc approaches. Current references: let-elimination
        (Peyton Jones & Marlow, JFP 2002), if-conversion (Allen et al., POPL 1983),
        guarded commands (Dijkstra, CACM 1975), frame conditions (Lamport, TLA+).
        New translation passes should follow this convention.
    - description: "ts2pant: snapshot tests for new constructs"
      content: >
        New language constructs need a fixture file in tests/fixtures/constructs/
        (category-based naming, e.g. expressions-arithmetic.ts, guards-assert.ts).
        Exported functions are auto-discovered by constructs.test.mts. Regenerate
        snapshots with npm run test:update-snapshots.
chat:
  auto_reply: true
