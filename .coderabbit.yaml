language: en
reviews:
  profile: assertive
  request_changes_workflow: false
  high_level_summary: false
  sequence_diagrams: false
  poem: false
  review_status: false
  collapse_walkthrough: true
  changed_files_summary: false
  labeling_instructions: []
  finishing_touches:
    docstrings:
      enabled: false
    unit_tests:
      enabled: false
  auto_review:
    enabled: true
    auto_pause_after_reviewed_commits: 0
    drafts: false
  path_instructions:
    - path: "lib/**"
      instructions: >
        Core library for Pantagruel, a specification language checker in OCaml.
        Focus on type safety, exhaustive pattern matching, and correctness.
        The pipeline is: lexer (sedlex) -> parser (menhir) -> collect (declaration gathering) -> check (type checking).
        Key types: Ast.type_expr (syntactic), Types.ty (internal with numeric hierarchy Nat < Nat0 < Int < Real), Env.t (type environment).
    - path: "lib/smt*.ml"
      instructions: >
        SMT bounded model checking. This module is large (~2900 LOC) and slated for decomposition.
        Review for correctness of Z3/CVC5 encoding, proper guard injection, and soundness of bounded checks.
    - path: "test/**"
      instructions: >
        Alcotest + QCheck tests. Check for good coverage of edge cases.
        Tests should never be skipped — if a test fails, fix the underlying issue.
    - path: "samples/**"
      instructions: >
        Sample .pant specification files used for validation and documentation.
        These are also used as integration tests — check that they exercise the feature they claim to demonstrate.
    - path: "tools/ts2pant/**"
      instructions: >
        TypeScript-to-Pantagruel translator (not OCaml). Key review rules:
        (1) Opaque AST discipline — all AST construction via getAst(), all substitution via ast.substituteBinder(). Never traverse or inspect OCaml heap values from TS.
        (2) Name hygiene — fresh binders use $N names from monotonic UniqueSupply, never user identifiers. $ prefix cannot collide with property names.
        (3) Explicit unsupported results — use { unsupported: reason } unions (BodyResult/PropResult), not exceptions. Reasons must be user-facing.
        (4) Guard extraction before body translation — guards (if-throw, assert, helper propagation) extracted first to avoid double-processing. Detection must match between translate-signature.ts and translate-body.ts.
        (5) Frame conditions mandatory for mutating functions — emit identity constraints (prop' obj = prop obj) for every accessor not in the modifies set.
        (6) Numeric strategy pluggable — always strategy.mapNumber(), never hardcoded type strings.
        (7) Standard algorithms with literature references — name the technique, cite the paper (Peyton Jones, Allen et al., Dijkstra, Lamport).
        (8) Snapshot tests for new constructs — fixture in tests/fixtures/constructs/, auto-discovered by constructs.test.mts.
    - path: "wasm/**"
      instructions: >
        WebAssembly build of the Pantagruel parser via wasm_of_ocaml.
        Build is gated by BUILD_WASM=true env var.
  tools:
    enabled: true
knowledge_base:
  code_guidelines:
    enabled: true
    filePatterns:
      - "CLAUDE.md"
      - "tools/ts2pant/CLAUDE.md"
chat:
  auto_reply: true
